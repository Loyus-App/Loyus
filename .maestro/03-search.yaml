appId: com.loyus.app
---
- launchApp:
    clearState: true
# Dismiss any lingering "Open in App?" system dialog
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
# Add two cards
- tapOn:
    id: "empty-state-cta"
- extendedWaitUntil:
    visible:
      id: "card-name-input"
    timeout: 8000
- tapOn:
    id: "card-name-input"
- inputText: "Carrefour"
- tapOn:
    id: "card-code-input"
- inputText: "1111111"
- tapOn:
    id: "format-picker"
- tapOn:
    text: "Code 128"
- tapOn:
    id: "save-card-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 5000
- tapOn:
    id: "add-card-button"
- tapOn:
    id: "card-name-input"
- inputText: "Leclerc"
- tapOn:
    id: "card-code-input"
- inputText: "2222222"
- tapOn:
    id: "format-picker"
- tapOn:
    text: "Code 128"
- tapOn:
    id: "save-card-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 5000
# Both visible
- assertVisible:
    text: "Carrefour"
- assertVisible:
    text: "Leclerc"
# Navigate to search via home trigger
- tapOn:
    text: "Find a card..."
- extendedWaitUntil:
    visible:
      id: "search-screen"
    timeout: 5000
- tapOn:
    id: "search-input"
- inputText: "Carr"
# Carrefour visible, Leclerc hidden
- assertVisible:
    text: "Carrefour"
- assertNotVisible:
    text: "Leclerc"
