name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types allowed in PR titles — matches CLAUDE.md commit style
          types: |
            feat
            fix
            test
            docs
            refactor
            chore
            perf
            ci
            build
            style
            revert
          # Scope is optional but must be lowercase (e.g. "feat(domain): ..." or "chore: ...")
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            must start with an uppercase character.
          wip: true
