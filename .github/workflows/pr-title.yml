name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

# Read-only token is enough — we fail the job on bad titles, we don't comment back.
# This keeps the workflow working under the "read" default org-wide permission setting.
permissions:
  contents: read

jobs:
  validate:
    name: Validate conventional commit title
    runs-on: ubuntu-latest
    steps:
      - name: Check conventional-commit title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -eu
          TYPES='feat|fix|test|docs|refactor|chore|perf|ci|build|style|revert'
          # Optional scope, optional breaking-change !, required colon + space + non-empty subject.
          PATTERN="^(${TYPES})(\\([a-z0-9._/-]+\\))?!?: .+"
          if ! [[ "$TITLE" =~ $PATTERN ]]; then
            echo "::error title=Invalid PR title::PR title does not follow Conventional Commits."
            echo ""
            echo "Expected format: <type>(<optional scope>): <subject>"
            echo "Allowed types: ${TYPES//|/, }"
            echo ""
            echo "Got: \"$TITLE\""
            echo ""
            echo "Examples:"
            echo "  feat(domain): add rotating-code detection"
            echo "  fix(ios): purpose string for CoreLocation"
            echo "  chore: bump Dependabot limit"
            echo "  refactor(state)!: breaking change to cardStore shape"
            exit 1
          fi
          echo "PR title OK: \"$TITLE\""
