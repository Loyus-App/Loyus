name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write

jobs:
  validate:
    name: Validate conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types allowed in PR titles — matches CLAUDE.md commit style
          types: |
            feat
            fix
            test
            docs
            refactor
            chore
            perf
            ci
            build
            style
            revert
          # Scope is optional (e.g. "feat(domain): ..." or plain "chore: ...").
          # Subject is free-form — lowercase allowed (standard conventional commits).
          requireScope: false
          wip: true
