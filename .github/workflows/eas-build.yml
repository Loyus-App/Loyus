name: EAS Build

on:
  # Manual dispatch only — pick platform + profile.
  # Auto-triggered builds on push were removed to avoid burning EAS free minutes
  # on every main merge. Use the "Run workflow" button in Actions to build.
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options: [all, ios, android]
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options: [development, preview, production]

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS ${{ github.event.inputs.profile || 'preview' }} — ${{ github.event.inputs.platform || 'all' }}
    runs-on: ubuntu-latest
    # Only attempt if the EXPO_TOKEN secret is configured. Skip silently in forks.
    if: github.repository == 'Loyus-App/Loyus'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Build (non-interactive, no-wait)
        run: |
          eas build \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --non-interactive \
            --no-wait
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
