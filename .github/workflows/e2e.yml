name: E2E Tests (Maestro)

on:
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "assets/**"
      - "app.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".maestro/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    runs-on: macos-15
    timeout-minutes: 90

    env:
      # Bump when changing Xcode version — invalidates Pods/DerivedData caches
      # so artifacts built with one Xcode aren't restored into another.
      XCODE_VERSION: "26.2"

    steps:
      # 1. Checkout
      - uses: actions/checkout@v6

      # 2. Setup pnpm + Node
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 3. Setup Java 17 (Maestro 2.x requires GraalJS / Java 17+)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 4. Install dependencies
      - run: pnpm install --frozen-lockfile

      # 5. Cache CocoaPods (keyed by Xcode version — Swift module ABI changes per Xcode)
      - uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-xc${{ env.XCODE_VERSION }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-xc${{ env.XCODE_VERSION }}-

      # 6. Cache DerivedData (keyed by Xcode version)
      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ runner.os }}-xc${{ env.XCODE_VERSION }}-${{ hashFiles('ios/Podfile.lock') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            derived-data-${{ runner.os }}-xc${{ env.XCODE_VERSION }}-${{ hashFiles('ios/Podfile.lock') }}-
            derived-data-${{ runner.os }}-xc${{ env.XCODE_VERSION }}-

      # 7. Select Xcode (Expo SDK 55 requires Swift 6.2 → Xcode 26.x)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      # 8. Boot iOS simulator
      - name: Boot simulator
        run: |
          xcrun simctl boot "iPhone 16" 2>/dev/null || true
          xcrun simctl bootstatus "iPhone 16" -b

      # 9. Install Maestro CLI (version pinned in .maestro/maestro-version)
      - name: Install Maestro
        run: |
          export MAESTRO_VERSION=$(cat .maestro/maestro-version)
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 10. Build E2E dev-client
      # expo run:ios handles prebuild + xcodebuild + simulator install in one step
      - name: Build E2E dev-client
        run: npx expo run:ios --device "iPhone 16" --configuration Release
        env:
          EXPO_PUBLIC_E2E: "true"
          CI: "true"

      # 11. Run Maestro tests
      - name: Run Maestro tests
        run: |
          maestro test \
            --format junit \
            --output .maestro/reports/report.xml \
            --test-output-dir .maestro/reports \
            .maestro/

      # 12. Upload artifacts on failure only
      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-${{ github.run_id }}
          path: .maestro/reports/
          retention-days: 7
